<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Praias Fluviais</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/shared.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/layout-overrides.js"></script>
  <!-- Quill WYSIWYG editor -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    /* Quill editor integration */
    .ql-editor { min-height: 120px; font-family: 'Open Sans', sans-serif; font-size: 14px; line-height: 1.6; color: #2D2820; }
    .ql-editor p { margin-bottom: 0.5em; }
    .ql-toolbar.ql-snow { border-radius: 8px 8px 0 0 !important; border-color: #E2D9C6 !important; background: #FAF8F5; }
    .ql-container.ql-snow { border-radius: 0 0 8px 8px !important; border-color: #E2D9C6 !important; }
    .ql-toolbar.ql-snow .ql-picker-label { color: #4B3F2A; }
    .ql-toolbar.ql-snow button:hover .ql-stroke { stroke: #003A40; }
    .ql-toolbar.ql-snow button.ql-active .ql-stroke { stroke: #003A40; }
    /* Drag-and-drop sortable items */
    .draggable-item[draggable="true"] { cursor: grab; }
    .draggable-item[draggable="true"]:active { cursor: grabbing; }
    .draggable-item.drag-over { outline: 2px dashed #FFEB3B; background: rgba(255,235,59,0.08); border-radius: 8px; }
  </style>
</head>

<body class="bg-praia-sand-50 font-body text-praia-sand-900 antialiased">
  <div id="admin-app">
    <div class="flex items-center justify-center min-h-screen">
      <div class="skeleton w-64 h-8 rounded-xl"></div>
    </div>
  </div>

  <!-- Supabase (para ler dados de utilizadores) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
