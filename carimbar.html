<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Carimbar praia | Praias Fluviais</title>
  <meta name="description" content="Confirme a sua visita e adicione este carimbo ao seu passaporte digital das praias fluviais portuguesas.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#002A2E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Poppins:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/shared.js"></script>
  <script src="js/data-loader.js"></script>
  <!-- Supabase (auth + stamps) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="stylesheet" href="css/shared.css">

  <style>
    :root {
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    html, body {
      background: radial-gradient(circle at 20% 0%, #004D54 0%, #002A2E 55%, #001418 100%);
      min-height: 100vh;
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('img/noise-texture.svg');
      background-size: 180px;
      opacity: 0.09;
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: 1;
    }

    /* Scatter of decorative dots behind the card, print-reminiscent */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 12% 18%, rgba(255,235,59,0.08) 0, transparent 40%),
        radial-gradient(circle at 88% 72%, rgba(38,196,171,0.10) 0, transparent 45%);
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .brand-bar {
      padding: calc(20px + env(safe-area-inset-top)) 20px 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .brand-bar img { height: 64px; width: auto; opacity: 1; }
    @media (max-width: 380px) {
      .brand-bar img { height: 56px; }
    }

    .card-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px 40px;
    }

    /* ── Base Card ──────────────────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 460px;
      background: linear-gradient(180deg, #003A40 0%, #002A2E 100%);
      border-radius: 28px;
      overflow: hidden;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.06) inset,
        0 30px 60px -20px rgba(0,0,0,0.65),
        0 8px 20px -6px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.06);
      transform: scale(0.94);
      opacity: 0;
      animation: cardIn 0.7s var(--spring) 0.05s forwards;
    }
    @keyframes cardIn {
      to { transform: scale(1); opacity: 1; }
    }

    /* ── Loading ────────────────────────────────────────────────────────── */
    .loading-card { padding: 64px 28px; text-align: center; }
    .loading-pulse {
      width: 64px; height: 64px;
      margin: 0 auto 22px;
      border-radius: 50%;
      border: 3px solid rgba(255,235,59,0.18);
      border-top-color: #FFEB3B;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: #fff;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    .loading-sub {
      font-family: 'Open Sans', sans-serif;
      font-size: 13.5px;
      color: rgba(232,223,208,0.7);
      line-height: 1.6;
      max-width: 300px;
      margin: 0 auto;
    }

    /* ── Error ──────────────────────────────────────────────────────────── */
    .error-card { padding: 52px 28px 36px; text-align: center; }
    .error-icon {
      width: 68px; height: 68px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: rgba(211,47,47,0.14);
      border: 1.5px solid rgba(244,143,117,0.45);
      display: flex; align-items: center; justify-content: center;
      color: #F4BFA8;
      transform: scale(0.6);
      opacity: 0;
      animation: popIn 0.5s var(--spring) 0.1s forwards;
    }
    .error-icon svg { width: 30px; height: 30px; }
    .error-eyebrow {
      font-family: 'Poppins', sans-serif;
      font-size: 11px; letter-spacing: 0.22em;
      color: #F4BFA8; font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .error-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: #fff;
      line-height: 1.25;
      letter-spacing: -0.015em;
      margin-bottom: 10px;
    }
    .error-body {
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      color: rgba(232,223,208,0.78);
      line-height: 1.6;
      margin-bottom: 24px;
      max-width: 340px; margin-left: auto; margin-right: auto;
    }
    .error-actions {
      display: flex; flex-direction: column; gap: 10px;
      max-width: 300px; margin: 0 auto;
    }

    /* ── Buttons ────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 22px;
      border-radius: 14px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 14.5px;
      letter-spacing: 0.01em;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.3s var(--spring), box-shadow 0.3s var(--smooth), background-color 0.3s var(--smooth);
      user-select: none;
    }
    .btn-primary {
      background: #FFEB3B;
      color: #002A2E;
      box-shadow: 0 8px 22px -6px rgba(255,235,59,0.45);
    }
    .btn-primary:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 14px 28px -8px rgba(255,235,59,0.6); }
    .btn-primary:active { transform: translateY(0) scale(0.98); }
    .btn-ghost {
      background: rgba(255,255,255,0.06);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }

    /* ── Success Hero ───────────────────────────────────────────────────── */
    .hero {
      position: relative;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      background: #001A1D;
    }
    .hero-photo {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center;
      filter: saturate(0.85) contrast(1.05);
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background:
        linear-gradient(180deg, rgba(0,42,46,0.15) 0%, rgba(0,42,46,0.55) 55%, #002A2E 98%),
        linear-gradient(135deg, rgba(0,58,64,0.45), rgba(0,26,29,0.35));
      mix-blend-mode: multiply;
    }
    .hero-grain {
      position: absolute; inset: 0;
      background-image: url('img/noise-texture.svg');
      background-size: 160px;
      opacity: 0.22;
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    /* Selo no canto superior-direito (PNG já transparente). Tinta forçada a
       branco via filter; rotação positiva => topo inclina para a direita,
       criando a abertura à direita pedida. */
    .stamp-emblem-wrap {
      position: absolute;
      top: 14px; right: 14px;
      transform: rotate(0deg) scale(1.6);
      opacity: 0;
      animation: stampSlam 0.9s var(--spring) 0.4s forwards;
      transform-origin: 70% 30%;
      filter: drop-shadow(0 14px 22px rgba(0,0,0,0.55)) drop-shadow(0 0 16px rgba(255,235,59,0.22));
    }
    .stamp-emblem {
      width: 152px;
      height: auto;
      display: block;
      transform: rotate(12deg);
      filter: brightness(0) invert(1);
    }
    @media (max-width: 380px) {
      .stamp-emblem { width: 128px; }
    }
    /* Data como pílula independente no canto superior-esquerdo, horizontal */
    .stamp-date {
      position: absolute;
      top: 16px; left: 16px;
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      background: rgba(0,42,46,0.78);
      border: 1px solid rgba(255,235,59,0.4);
      border-radius: 999px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 10.5px;
      color: #FFEB3B;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
      box-shadow: 0 6px 18px -6px rgba(0,0,0,0.5);
      opacity: 0;
      animation: dateFadeIn 0.5s var(--smooth) 0.85s forwards;
    }
    @keyframes stampSlam {
      0%   { transform: rotate(-6deg) scale(2.1); opacity: 0; }
      55%  { transform: rotate(4deg) scale(0.95); opacity: 1; }
      80%  { transform: rotate(1deg) scale(1.04); }
      100% { transform: rotate(0deg) scale(1); opacity: 1; }
    }
    @keyframes dateFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Content below hero */
    .hero-eyebrow {
      position: absolute;
      left: 22px; bottom: 16px;
      font-family: 'Poppins', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.26em;
      color: #FFEB3B;
      text-transform: uppercase;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .hero-eyebrow::before {
      content: ''; width: 22px; height: 1.5px; background: #FFEB3B; display: inline-block;
    }

    .body-pad { padding: 22px 24px 26px; }
    .beach-name {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 28px;
      line-height: 1.12;
      color: #fff;
      letter-spacing: -0.02em;
      margin: 0 0 8px 0;
      opacity: 0; transform: translateY(10px);
      animation: fadeUp 0.6s var(--smooth) 0.55s forwards;
    }
    .beach-meta {
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      color: rgba(232,223,208,0.72);
      display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
      opacity: 0; transform: translateY(10px);
      animation: fadeUp 0.6s var(--smooth) 0.7s forwards;
    }
    .beach-meta .sep {
      width: 4px; height: 4px; border-radius: 50%;
      background: rgba(255,235,59,0.6);
    }

    .progress-wrap {
      margin: 22px 0 20px;
      opacity: 0; transform: translateY(10px);
      animation: fadeUp 0.6s var(--smooth) 0.85s forwards;
    }
    .progress-label {
      display: flex; justify-content: space-between; align-items: baseline;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 12px;
      color: rgba(232,223,208,0.7);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .progress-label strong {
      font-weight: 800;
      font-size: 15px;
      color: #fff;
      letter-spacing: -0.01em;
      text-transform: none;
    }
    .progress-track {
      height: 8px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #FDD835 0%, #FFEB3B 50%, #FFF176 100%);
      box-shadow: 0 0 18px rgba(255,235,59,0.35);
      width: 0;
      transition: width 1s var(--smooth) 1s;
    }

    .actions {
      display: flex; flex-direction: column; gap: 10px;
      opacity: 0; transform: translateY(10px);
      animation: fadeUp 0.6s var(--smooth) 1s forwards;
    }

    /* Guest CTA */
    .guest-note {
      margin-top: 16px;
      padding: 14px 16px;
      background: rgba(255,235,59,0.06);
      border: 1px solid rgba(255,235,59,0.18);
      border-radius: 12px;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      color: rgba(232,223,208,0.86);
      line-height: 1.55;
      opacity: 0; transform: translateY(10px);
      animation: fadeUp 0.6s var(--smooth) 1.1s forwards;
    }
    .guest-note strong { color: #FFEB3B; font-weight: 700; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      0%   { transform: scale(0.4); opacity: 0; }
      70%  { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Small screens refinement */
    @media (max-width: 380px) {
      .stamp-disc { width: 96px; height: 96px; top: 16px; right: 16px; }
      .stamp-disc .stamp-mid { font-size: 18px; }
      .beach-name { font-size: 24px; }
      .body-pad { padding: 20px 20px 24px; }
    }

    /* Reduce motion respect */
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; animation-delay: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body class="font-body text-white antialiased">

  <div class="page-wrap">
    <header class="brand-bar">
      <a href="index.html" aria-label="Voltar ao início">
        <img src="brand_assets/logotipo.png" alt="Guia das Praias Fluviais">
      </a>
    </header>

    <main class="card-wrap">
      <section id="carimbar-state" class="card" aria-live="polite">
        <!-- Initial loading state — replaced by qr-stamp.js -->
        <div class="loading-card">
          <div class="loading-pulse" aria-hidden="true"></div>
          <h1 class="loading-title">A preparar o carimbo…</h1>
          <p class="loading-sub">Vamos confirmar a sua localização para registar a visita.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="js/qr-stamp.js" defer></script>
</body>
</html>
